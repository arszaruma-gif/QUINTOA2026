version: "3.9"

services:
  dbclase:
    image: postgres:15-alpine
    environment:
      - TZ=America/Guayaquil
      - POSTGRES_DB=ejemplo1
      - POSTGRES_USER=quinto
      - POSTGRES_PASSWORD=123
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_dbclase:/var/lib/postgresql/data/pgdata
    networks:
      - net_dbclase

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL: ajb.vera@yavirac.edu.ec
      - PGADMIN_DEFAULT_PASSWORD: 1234
    volumes:
      - pg_pgadmin_data:/var/lib/pgadmin
    networks:
      - net_dbclase

volumes:
  pg_dbclase::
    external: true

networks:
  net_dbclase:
    external: true
